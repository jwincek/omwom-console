# Redirect www to non-www
server {
    listen 80;
    server_name www.console.omwom.com;
    return 301 https://console.omwom.com$request_uri;
}

server {
    listen 80;
    server_name console.omwom.com;

    # Certbot will add SSL config after certificate issuance

    # HTTP Basic Auth
    auth_basic "OMWOM Console";
    auth_basic_user_file /etc/nginx/.htpasswd_console;

    location / {
        proxy_pass http://127.0.0.1:8073;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (required for Streamlit)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Streamlit static assets
    location /_stcore/ {
        proxy_pass http://127.0.0.1:8073/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint (no auth required)
    location = /healthz {
        auth_basic off;
        proxy_pass http://127.0.0.1:8073/healthz;
    }
}
