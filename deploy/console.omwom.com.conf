# Rate limiting zone
limit_req_zone $binary_remote_addr zone=console_limit:10m rate=10r/s;

# Redirect www to non-www
server {
    listen 80;
    server_name www.console.omwom.com;
    return 301 https://console.omwom.com$request_uri;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name console.omwom.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name console.omwom.com;

    # SSL (managed by Certbot — certs added after `certbot --nginx`)
    # ssl_certificate /etc/letsencrypt/live/console.omwom.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/console.omwom.com/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HTTP Basic Auth
    auth_basic "OMWOM Console";
    auth_basic_user_file /etc/nginx/.htpasswd_console;

    # Rate limiting
    limit_req zone=console_limit burst=20 nodelay;

    location / {
        proxy_pass http://127.0.0.1:8073;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (required for Streamlit)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Streamlit static assets
    location /_stcore/ {
        proxy_pass http://127.0.0.1:8073/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint (IP-restricted, no auth)
    location = /healthz {
        auth_basic off;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8073/healthz;
    }
}
